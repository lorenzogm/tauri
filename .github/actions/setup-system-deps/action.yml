name: 'Setup System Dependencies'
description: 'Install system dependencies required for Tauri development'

inputs:
  cache-key:
    description: 'Cache key for system dependencies'
    required: false
    default: 'system-deps-v1'

runs:
  using: 'composite'
  steps:
    - name: Check cache for system dependencies
      id: cache-system-deps
      uses: actions/cache@v4
      with:
        path: ~/.cache/system-deps-marker
        key: ${{ inputs.cache-key }}-${{ runner.os }}-${{ hashFiles('/etc/apt/sources.list*') }}
        restore-keys: |
          ${{ inputs.cache-key }}-${{ runner.os }}-

    - name: Install system dependencies
      if: steps.cache-system-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          libgtk-3-dev \
          libglib2.0-dev \
          libgobject-introspection-1.0-dev \
          pkg-config
        # Create cache marker
        mkdir -p ~/.cache
        touch ~/.cache/system-deps-marker