name: 'Build Android APK'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'android'
            args: '--target aarch64-linux-android'

    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-cli-v2
          cache-directories: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        id: tauri-cli-cache
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ runner.os }}-v2.0

      - name: Install dependencies (ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: |
          echo "Installing Tauri CLI..."
          cargo install tauri-cli --version "^2.0" --locked

      - name: Verify Tauri CLI installation
        run: |
          cargo tauri --version
          echo "Tauri CLI is ready!"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Cache Android Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android-build-${{ matrix.args }}

      - name: Android init
        run: cd src-tauri && cargo tauri android init

      - name: Build Android APK
        run: cd src-tauri && cargo tauri android build --apk ${{ matrix.args }}

      - name: Find APK files
        run: find src-tauri/gen -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptomafia-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk