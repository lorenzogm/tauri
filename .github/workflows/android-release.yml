name: 'Build Android APK'

"on":
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (optional)'
        required: false
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-pre-build:
    name: 'Pre-build Validation'
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate build prerequisites
        id: check
        run: |
          # Check if this is a valid release tag or manual dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "✅ Valid release trigger detected"
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "❌ Invalid release trigger"
            exit 1
          fi

  build-android:
    name: 'Build Android APK'
    runs-on: ubuntu-latest
    needs: validate-pre-build
    if: needs.validate-pre-build.outputs.should-build == 'true'
    permissions:
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'android'
            args: '--target aarch64-linux-android'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version number
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # For tag builds, use the tag name as version
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "APK_SUFFIX=" >> $GITHUB_OUTPUT
          else
            # For main branch builds, generate dev version
            SHORT_SHA=$(git rev-parse --short HEAD)
            BUILD_NUMBER=${{ github.run_number }}
            VERSION="0.1.0-dev.${SHORT_SHA}.${BUILD_NUMBER}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
            echo "APK_SUFFIX=-dev-${SHORT_SHA}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          fi
          echo "Generated version: $VERSION"

      - name: Update Tauri config version
        run: |
          # Update version in tauri.conf.json
          sed -i '/"version":/s/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' \
            src-tauri/tauri.conf.json
          echo "Updated tauri.conf.json version to ${{ steps.version.outputs.VERSION }}"
          
      - name: Update Cargo.toml version
        run: |
          # Update version in Cargo.toml (only the package version, line 3)
          sed -i '3s/version = ".*"/version = "${{ steps.version.outputs.VERSION }}"/' \
            src-tauri/Cargo.toml
          echo "Updated Cargo.toml version to ${{ steps.version.outputs.VERSION }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-cli-v2
          cache-directories: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        id: tauri-cli-cache
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ runner.os }}-v2.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchel

      - name: Install Tauri CLI
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: |
          echo "Installing Tauri CLI..."
          cargo install tauri-cli --version "^2.0" --locked

      - name: Verify Tauri CLI installation
        run: |
          cargo tauri --version
          echo "Tauri CLI is ready!"

      # Quality checks before building
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend quality checks
        run: |
          cd frontend
          npm run lint
          npx tsc --noEmit

      - name: Backend quality checks
        run: |
          cd src-tauri
          cargo fmt --check
          cargo clippy --all-targets --all-features || echo "⚠️ Clippy warnings to be resolved"

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Cache Android Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android-build-${{ matrix.args }}

      - name: Add Android config to Tauri
        run: |
          cd src-tauri
          # Temporarily add Android config for build
          cp tauri.conf.json tauri.conf.json.backup
          cat tauri.conf.json.backup | jq '. + {"android": {"minSdkVersion": 24, "compileSdkVersion": 34, "targetSdkVersion": 34}}' > tauri.conf.json

      - name: Android init
        run: cd src-tauri && cargo tauri android init

      - name: Build Android APK
        run: cd src-tauri && cargo tauri android build --apk ${{ matrix.args }}

      - name: Restore Tauri config
        if: always()
        run: |
          cd src-tauri
          mv tauri.conf.json.backup tauri.conf.json

      - name: Find APK files
        run: find src-tauri/gen -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptomafia-android-apk${{ steps.version.outputs.APK_SUFFIX }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.IS_RELEASE == 'true'
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          tag_name: v${{ steps.version.outputs.VERSION }}
